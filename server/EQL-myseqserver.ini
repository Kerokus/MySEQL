#
#  MySEQ Open server config for EVERQUEST LEGENDS (64-bit fork of classic EQ).
#  Run the server with:   MySEQ.server.exe -f EQL-myseqserver.ini
#
#  Offsets reverse-engineered 2026-07 against eqgame.exe (ImageBase 0x140000000).
#  Ground truth: #Trooper_Axlia00 = L50 Warrior / Iksar / NPC ; Anomander = local player (PC), L47.
#
#  Spawn-list traversal (EQL two-hop):
#     manager    = [eqgame.exe + 0xF88728]     <- SpawnHeaderAddr below (ImageBase-relative)
#     firstSpawn = [manager + 0x10]            <- SpawnListHop below
#     next       = [spawn   + 0x10]            <- NextOffset below (walk until next == 0)
#  The SpawnListHop key (EQL-only) tells the server to do the extra +0x10 deref and walk
#  forward-only. Omit it (or set 0) for classic single-deref EQ servers.
#

[File Info]
Patchdate=07/06/2026

[Port]
port=5555

[Memory Offsets]
# Confirmed: entity-list manager. [manager + SpawnListHop] = first spawn.
SpawnHeaderAddr=0x140F88728
SpawnListHop=0x10
# ZoneAddr: static zone-info struct, SHORT name "nro" (long name at +0x80 confirms). Server reads
#   the string directly here (no deref). VERIFY: server should show zone "nro" + update on zone change.
ZoneAddr=0x140F0EA50
# CharInfo: player object ptr (same global the radar root uses). getCharName derefs it, reads name
#   @ +0xb8. VERIFY: server should show char name "Anomander". Backup zone-name global: 0x140F8DC8C.
CharInfo=0x140F04430
TargetAddr=0x0
ItemsAddr=0x0
WorldAddr=0x0

[WorldInfo Offsets]
WorldHourOffset=8
WorldMinuteOffset=9
WorldDayOffset=10
WorldMonthOffset=11
WorldYearOffset=12

[SpawnInfo Offsets]
# --- CONFIRMED (live-verified against ground-truth spawns) ---
NextOffset=0x10
PrevOffset=0x08
XOffset=0x74
YOffset=0x78
ZOffset=0x7c
HeadingOffset=0x94
NameOffset=0xb8
LastnameOffset=0xf8
TypeOffset=0x139
SpawnIDOffset=0x178
LevelOffset=0x5c1
SpeedOffset=0x8c
# Read id/race/etc. as full DWORDs (NOT the 8-bit-race path, which truncates id to 16 bits).
EightBitRace=0
# --- RACE: CONFIRMED model/race id (DWORD). Iksar PC=128, human guard=44, orc=54, snake=37...
#     Legends' own numbering (not classic-EQ enum) except Iksar; stock client race NAMES may be off.
RaceOffset=0x10F4
# --- CLASS: BITMASK dword @ 0x1100 (bit index = class id; multiclass = OR of bits). With
#     ClassIsBitmask=1 the server converts it to the primary (lowest-bit) class id so the client's
#     class-name table resolves it (see Spawn.cpp / Spawn.h lowestSetBitIndex). Requires server rebuild.
ClassOffset=0x1100
ClassIsBitmask=1
# --- NOT YET MAPPED: parked in the 0x5D0-0x5FF all-zero block so they read 0 (harmless) ---
HideOffset=0x5d0
OwnerIDOffset=0x5d8
PrimaryOffset=0x5dc
OffhandOffset=0x5e0

[GroundItem Offsets]
# TODO: not yet mapped for EQL.
PrevOffset=0x0
NextOffset=0x8
IdOffset=0x10
DropIdOffset=0x18
