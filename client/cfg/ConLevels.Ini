# EQL con-color boundaries for the lower bands (grey / green / light blue).
# Format:  <Gamer Level> = <Max Grey> / <Max Green> / <Max Light Blue>
#
#   Grey       = 1              .. Max Grey
#   Green      = Max Grey + 1   .. Max Green
#   Light Blue = Max Green + 1  .. Max Light Blue
#   Dark Blue  = Max LtBlue + 1 .. Gamer Level - 1
#   White      = Gamer Level
#   Yellow     = Level + 1      .. Level + 5      (flat +5, hardcoded in SpawnColors.EQLCon)
#   Red        = Level + 6      .. up
#
# EXACT values, dumped from the live client's own con table (FUN_1406a1820 -> DAT_140fb4a60,
# indexed [self*0x83 + mob]); simulating FillConColors against them reproduces every in-game
# level/mob con with zero mismatches (1-80).  -1 = that band is absent at this level.
#
# NOTE: the 3rd field is MAX LIGHT BLUE (= in-game MinDarkBlue - 1). The client's cyan loop
# fills up to and including it, then dark blue starts. (Older files stored MinDarkBlue here,
# drawing the light/dark-blue edge one level too high.)

