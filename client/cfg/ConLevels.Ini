# Usage: Gamer Level = Max Grey/Max Green/Min DkBlue

# Formulas
# Grey   = 1 -> Max Grey
# Green  = Max Grey    + 1 -> Max Green
# LtBlue = Max Green   + 1 -> Min DkBlue - 1
# DkBlue = Min DkBlue      -> Gamer Level - 1
# White  = Gamer Level
# Yellow = Gamer Level + 1 -> Gamer Level + 3
# Red    = Gamer Level + 4 -> 1000
#
# EQL (eqlwiki.com/Consider) uses the classic EQ con curve. Every level 1-80 is filled in
# (interpolated between the original anchor levels 1-10/20/30/40/50/60/70-80) so intermediate
# levels con correctly instead of falling back to 0/0/0.

